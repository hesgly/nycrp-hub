<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYCRP | Management Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        :root { --primary: #10b981; --bg: #09090b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fafafa; margin: 0; overflow: hidden; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 60%); z-index: 0; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(18, 18, 22, 0.75); border: 1px solid rgba(39, 39, 42, 0.8); backdrop-filter: blur(16px); }
        .sidebar-item { cursor: pointer; transition: all 0.3s ease; border-right: 4px solid transparent; color: #71717a; }
        .sidebar-item:hover { background: rgba(16, 185, 129, 0.1); color: var(--primary); padding-left: 1.75rem; }
        .active-tab { background: rgba(16, 185, 129, 0.15) !important; color: var(--primary) !important; border-right: 4px solid var(--primary) !important; }
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: #09090b; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #dashboard-ui { display: none; height: 100vh; width: 100vw; z-index: 10; position: relative; }
        #login-screen { position: fixed; inset: 0; z-index: 9998; background: #0c0c0e; display: none; align-items: center; justify-content: center; }
        .progress-bar-container { width: 300px; height: 4px; background: #18181b; border-radius: 99px; overflow: hidden; margin-top: 24px; position: relative; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.1s linear; box-shadow: 0 0 15px var(--primary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-online { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        .dot-offline { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        input, textarea { background: #121214 !important; border: 1px solid #27272a !important; color: white !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="bg-glow"></div>

    <div id="loading-screen">
        <img src="logo.jpg" class="w-32 h-32 mb-10 object-contain animate-pulse" onerror="this.src='logo.png'">
        <div class="flex flex-col items-center">
            <h2 id="percent-text" class="text-5xl font-black italic text-white mb-2 leading-none">0%</h2>
            <p id="load-status" class="text-[9px] font-bold uppercase tracking-[0.4em] text-emerald-500 italic mb-4">Establishing Secure Node Sync...</p>
            <div class="progress-bar-container"><div id="progress-fill"></div></div>
        </div>
    </div>

    <div id="login-screen">
        <div class="glass p-14 rounded-[3.5rem] w-[440px] space-y-10 border-emerald-500/10 shadow-2xl">
            <div class="text-center space-y-3">
                <img src="logo.jpg" class="w-20 h-20 mx-auto mb-4" onerror="this.src='logo.png'">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">Management Auth</h2>
            </div>
            <div class="space-y-6">
                <input type="text" id="user-input" placeholder="USERNAME" class="w-full p-5 rounded-2xl text-xs font-bold uppercase">
                <input type="password" id="pass-input" placeholder="PASSWORD" class="w-full p-5 rounded-2xl text-xs font-bold tracking-widest">
                <button onclick="attemptLogin()" class="w-full bg-emerald-500 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs hover:brightness-110 active:scale-95 transition-all">Sign In</button>
                <p id="auth-error" class="text-[10px] text-red-500 font-bold uppercase text-center opacity-0">Access Denied</p>
            </div>
        </div>
    </div>

    <div id="dashboard-ui">
        <aside class="w-80 border-r border-zinc-800 flex flex-col py-12 bg-[#09090b] relative z-50">
            <div class="flex flex-col items-center px-10 mb-16 text-center">
                <img src="logo.jpg" class="w-24 h-24 mb-6 object-contain rounded-full border-2 border-emerald-500/30 bg-zinc-900" onerror="this.src='logo.png'">
                <h1 id="sidebar-username" class="text-3xl font-black italic tracking-tighter uppercase text-white mb-1 leading-none">HESGLY</h1>
                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mt-2 italic underline underline-offset-4 decoration-zinc-800">Authorized Manager</p>
            </div>
            <nav class="flex-1 px-6 space-y-3 font-bold text-xs uppercase italic tracking-tighter">
                <div onclick="showTab('overview')" id="btn-overview" class="sidebar-item active-tab flex items-center gap-4 p-5 rounded-3xl"><i data-lucide="layout-dashboard"></i> Overview</div>
                <div onclick="showTab('roster')" id="btn-roster" class="sidebar-item flex items-center gap-4 p-5 rounded-3xl"><i data-lucide="users"></i> Staff Roster</div>
                <div onclick="showTab('actions')" id="btn-actions" class="sidebar-item flex items-center gap-4 p-5 rounded-3xl"><i data-lucide="zap"></i> Dispatch</div>
                <div onclick="showTab('forms')" id="btn-forms" class="sidebar-item flex items-center gap-4 p-5 rounded-3xl"><i data-lucide="file-plus"></i> Architect</div>
                <div onclick="showTab('chat')" id="btn-chat" class="sidebar-item flex items-center gap-4 p-5 rounded-3xl"><i data-lucide="message-square"></i> Intel Chat</div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-16 relative">
            <div id="tab-container" class="slide-up">
                <section id="tab-overview" class="tab-content space-y-12">
                    <h2 class="text-6xl font-black italic uppercase tracking-tighter text-white leading-none">Dashboard</h2>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="glass p-10 rounded-[3rem] border-l-[10px] border-emerald-500/50">
                            <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Official NPM Bridge</p>
                            <div class="flex items-center"><span id="api-dot" class="status-dot dot-offline"></span><span id="api-text" class="font-black uppercase tracking-tighter text-sm italic">Connecting...</span></div>
                        </div>
                        <div class="glass p-10 rounded-[3rem] border-l-[10px] border-purple-500/50">
                            <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Personnel Logged</p>
                            <p id="staff-count" class="font-black text-white text-4xl italic tracking-tighter uppercase leading-none">--</p>
                        </div>
                    </div>
                    <div class="glass rounded-[3.5rem] overflow-hidden">
                        <div class="p-10 border-b border-zinc-800 bg-zinc-950/20"><h3 class="font-black italic uppercase tracking-tighter text-xl text-white">System Audit Log</h3></div>
                        <div class="max-h-[500px] overflow-y-auto p-8 italic text-zinc-500 font-bold uppercase text-[10px] tracking-widest" id="log-feed">Waiting for API payload...</div>
                    </div>
                </section>
                </div>
        </main>
    </div>

    <script>
        let progress = 0;
        const loadingTimer = setInterval(() => {
            progress++;
            document.getElementById('progress-fill').style.width = progress + "%";
            document.getElementById('percent-text').innerText = progress + "%";
            if(progress >= 100) { clearInterval(loadingTimer); setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; }, 800); }
        }, 100); 

        function attemptLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if(u.toLowerCase() === "hesgly" && p === "W3xFn9q2Uz") {
                document.getElementById('sidebar-username').innerText = u.toUpperCase();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'flex';
                lucide.createIcons();
                initSync();
            } else { document.getElementById('auth-error').style.opacity = "1"; setTimeout(() => document.getElementById('auth-error').style.opacity="0", 2000); }
        }

        async function initSync() {
            const dot = document.getElementById('api-dot');
            const text = document.getElementById('api-text');
            try {
                // TALKING TO YOUR NEW NPM BACKEND
                const res = await fetch('/api/sync');
                const data = await res.json();
                if(res.ok) {
                    dot.className = "status-dot dot-online";
                    text.innerText = "CONNECTED & LINKED";
                    text.style.color = "#10b981";
                    document.getElementById('staff-count').innerText = data.staffCount || "SYNCED";
                    document.getElementById('log-feed').innerText = "Official Melonly Package handshake successful. Personnel registry verified.";
                } else { throw new Error(data.message); }
            } catch (e) {
                dot.className = "status-dot dot-offline";
                text.innerText = "NPM BRIDGE ERROR";
                document.getElementById('log-feed').innerText = "ERROR: " + e.message;
            }
        }

        function showTab(name) {
            const container = document.getElementById('tab-container');
            container.classList.remove('slide-up');
            void container.offsetWidth;
            container.classList.add('slide-up');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${name}`).classList.remove('hidden');
            document.getElementById(`btn-${name}`).classList.add('active-tab');
            lucide.createIcons();
        }
    </script>
</body>
</html>
